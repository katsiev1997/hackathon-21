

services:
  backend:
    build: ./backend
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/hackforge
      SPRING_DATASOURCE_USERNAME: hackforge
      SPRING_DATASOURCE_PASSWORD: hackforge

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: hackforge
      POSTGRES_USER: hackforge
      POSTGRES_PASSWORD: hackforge
    ports:
      - "5432:5432"

