services:
  backend:
    build: ./backend
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/hackforge
      SPRING_DATASOURCE_USERNAME: hackforge
      SPRING_DATASOURCE_PASSWORD: hackforge

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: hackforge
      POSTGRES_USER: hackforge
      POSTGRES_PASSWORD: hackforge
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hackforge -d hackforge"]
      interval: 5s
      timeout: 5s
      retries: 10

  react-router-ssr:
    build:
      context: ./react-router-ssr
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8080/api}
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      PORT: 3000
    depends_on:
      - backend

volumes:
  postgres_data:
